name: Build + Deploy APT Repo (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends equivs dpkg-dev apt-utils

      - name: Build APT repo
        run: |
          ./scripts/build.sh repo

      - name: Sanity check repo files
        run: |
          test -s docs/dists/stable/Release
          test -s docs/dists/stable/InRelease
          test -s docs/dists/stable/main/binary-amd64/Packages
          test -s docs/dists/stable/main/binary-all/Packages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
